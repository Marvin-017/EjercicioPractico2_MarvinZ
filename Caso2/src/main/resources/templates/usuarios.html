<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{plantilla :: head}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">
    
    <nav th:replace="~{plantilla :: navbar}"></nav>

    <main class="contenido-principal">
        <div class="container mt-5">
            
            <div class="row align-items-center mb-4 g-3">
                <div class="col-lg-4">
                    <h2 class="fw-bold text-dark m-0">
                        <i class="bi bi-people-fill text-primary me-2"></i>Gestión de Usuarios
                    </h2>
                </div>
                
                <div class="col-lg-5">
                    <form th:action="@{/usuarios}" method="get" class="d-flex gap-2">
                        <div class="input-group shadow-sm">
                            <span class="input-group-text border-0 bg-white text-primary">
                                <i class="bi bi-filter-circle-fill"></i>
                            </span>
                            <select name="rolNombre" class="form-select border-0 bg-white cursor-pointer">
                                <option value="">Ver todos los roles...</option>
                                <option th:each="r : ${roles}" 
                                        th:value="${r.nombre}" 
                                        th:text="${r.nombre}"
                                        th:selected="${r.nombre == filtroAplicado}"></option>
                            </select>
                            <button type="submit" class="btn btn-primary px-3" title="Filtrar">
                                <i class="bi bi-search"></i>
                            </button>
                            <a th:if="${filtroAplicado}" th:href="@{/usuarios}" class="btn btn-danger px-3" title="Limpiar filtro">
                                <i class="bi bi-x-lg"></i>
                            </a>
                        </div>
                    </form>
                </div>

                <div class="col-lg-3 text-end">
                    <button class="btn btn-primary btn-redondeado shadow-sm w-100" data-bs-toggle="modal" data-bs-target="#modalUsuario" onclick="prepararNuevo()">
                        <i class="bi bi-person-plus-fill me-1"></i> Registrar Nuevo
                    </button>
                </div>
            </div>

            <div class="tarjeta-premium overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="text-secondary py-3 px-4">Nombre Completo</th>
                                <th class="text-secondary py-3">Email</th>
                                <th class="text-secondary py-3">Rol</th>
                                <th class="text-secondary py-3 text-center">Estado</th>
                                <th class="text-secondary py-3 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${usuarios.empty}">
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <i class="bi bi-emoji-frown fs-2 d-block mb-2"></i>
                                    No se encontraron usuarios con este criterio.
                                </td>
                            </tr>
                            <tr th:each="u : ${usuarios}">
                                <td class="px-4 fw-medium text-dark" th:text="${u.nombre}"></td>
                                <td class="text-muted" th:text="${u.email}"></td>
                                <td><span class="badge bg-info text-dark rounded-pill px-3 py-2" th:text="${u.rol.nombre}"></span></td>
                                <td class="text-center">
                                    <span th:class="${u.activo ? 'badge bg-success bg-opacity-10 text-success border border-success rounded-pill px-3' : 'badge bg-secondary bg-opacity-10 text-secondary border border-secondary rounded-pill px-3'}" 
                                          th:text="${u.activo ? 'Cuenta Activa' : 'Inactivo'}"></span>
                                </td>
                                <td class="text-center">
                                    <button class="btn btn-outline-warning btn-sm rounded-circle shadow-sm me-2" 
                                            th:onclick="'cargarEditar(' + ${u.id} + ')'" title="Editar Usuario">
                                        <i class="bi bi-pencil-square"></i>
                                    </button>
                                    <a th:href="@{/usuarios/eliminar/{id}(id=${u.id})}" class="btn btn-outline-danger btn-sm rounded-circle shadow-sm" title="Eliminar Usuario">
                                        <i class="bi bi-trash3-fill"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <div class="modal fade" id="modalUsuario" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content tarjeta-premium">
                <form th:action="@{/usuarios/guardar}" th:object="${usuarioNuevo}" method="post" id="formUsuario">
                    
                    <input type="hidden" th:field="*{id}" id="idEdit" />

                    <div class="modal-header border-0 bg-light">
                        <h5 class="modal-title fw-bold text-primary" id="modalTitulo"><i class="bi bi-person-badge me-2"></i>Nuevo Usuario</h5>
                        <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label class="form-label text-muted fw-semibold">Nombre Completo</label>
                            <input type="text" th:field="*{nombre}" id="nombreEdit" class="form-control bg-light border-0" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted fw-semibold">Correo Electrónico</label>
                            <input type="email" th:field="*{email}" id="emailEdit" class="form-control bg-light border-0" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted fw-semibold">Contraseña</label>
                            <input type="password" th:field="*{password}" id="passEdit" class="form-control bg-light border-0" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label text-muted fw-semibold">Rol Asignado</label>
                            <select th:field="*{rol.id}" id="rolEdit" class="form-select bg-light border-0 cursor-pointer">
                                <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.nombre}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-light btn-redondeado" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary btn-redondeado shadow-sm">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer th:replace="~{plantilla :: footer}"></footer>

    <script th:inline="javascript">
        function cargarEditar(id) {
            fetch('/usuarios/editar/' + id)
                .then(response => response.json())
                .then(usuario => {
                    document.getElementById('idEdit').value = usuario.id;
                    document.getElementById('nombreEdit').value = usuario.nombre;
                    document.getElementById('emailEdit').value = usuario.email;
                    document.getElementById('passEdit').value = usuario.password;
                    document.getElementById('rolEdit').value = usuario.rol.id;

                    document.getElementById('modalTitulo').innerHTML = '<i class="bi bi-pencil-square me-2"></i>Editar Usuario';
                    
                    var modal = new bootstrap.Modal(document.getElementById('modalUsuario'));
                    modal.show();
                });
        }

        function prepararNuevo() {
            document.getElementById('idEdit').value = "";
            document.getElementById('formUsuario').reset();
            document.getElementById('modalTitulo').innerHTML = '<i class="bi bi-person-badge me-2"></i>Nuevo Usuario';
        }
    </script>
</body>
</html>
