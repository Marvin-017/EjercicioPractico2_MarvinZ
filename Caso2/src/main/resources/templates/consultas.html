<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{plantilla :: head}"></head>

<body>
    <nav th:replace="~{plantilla :: navbar}"></nav>

    <main class="contenido-principal">
        <div class="container mt-5">
            
            <div class="mb-4">
                <h2 class="fw-bold text-dark">
                    <i class="bi bi-search text-primary me-2"></i>Consultas Avanzadas
                </h2>
                <p class="text-muted">Utilice los filtros dinámicos para encontrar eventos específicos.</p>
            </div>

            <div class="tarjeta-premium p-4 mb-5">
                <form th:action="@{/eventos/consultas}" method="get" id="formConsultas">
                    <div class="row g-3 align-items-end">
                        
                        <div class="col-md-3">
                            <label class="form-label fw-bold text-secondary small text-uppercase">Tipo de Filtro</label>
                            <select name="tipoConsulta" id="tipoConsulta" class="form-select border-0 bg-light py-2" 
                                    onchange="actualizarInterfaz()" required>
                                <option value="" disabled selected>Seleccione una opción...</option>
                                <option value="activos" th:selected="${param.tipoConsulta == 'activos'}">Listar Eventos Activos</option>
                                <option value="conteo" th:selected="${param.tipoConsulta == 'conteo'}">Contar Total de Activos</option>
                                <option value="nombre" th:selected="${param.tipoConsulta == 'nombre'}">Buscar por Nombre</option>
                                <option value="fechas" th:selected="${param.tipoConsulta == 'fechas'}">Rango de Fechas</option>
                            </select>
                        </div>

                        <div class="col-md-6" id="contenedorNombre" style="display: none;">
                            <label class="form-label fw-bold text-secondary small text-uppercase">Nombre del Evento</label>
                            <div class="input-group">
                                <span class="input-group-text border-0 bg-light"><i class="bi bi-pencil-square"></i></span>
                                <input type="text" name="valor" class="form-control border-0 bg-light py-2" 
                                       placeholder="Escriba aquí..." th:value="${param.valor}">
                            </div>
                        </div>

                        <div class="col-md-6" id="contenedorFechas" style="display: none;">
                            <div class="row g-2">
                                <div class="col-6">
                                    <label class="form-label fw-bold text-secondary small text-uppercase">Desde</label>
                                    <input type="date" name="inicio" class="form-control border-0 bg-light py-2" th:value="${param.inicio}">
                                </div>
                                <div class="col-6">
                                    <label class="form-label fw-bold text-secondary small text-uppercase">Hasta</label>
                                    <input type="date" name="fin" class="form-control border-0 bg-light py-2" th:value="${param.fin}">
                                </div>
                            </div>
                        </div>

                        <div class="col-md-3" id="contenedorBoton">
                            <button type="submit" class="btn btn-primary btn-redondeado w-100 py-2 shadow-sm">
                                <i class="bi bi-play-circle-fill me-2"></i>Ejecutar Consulta
                            </button>
                        </div>

                    </div>
                </form>
            </div>

            <div th:if="${mensaje}" class="alert alert-info border-0 shadow-sm rounded-4 mb-4 py-3">
                <i class="bi bi-info-circle-fill me-2"></i>
                <span th:text="${mensaje}"></span>
            </div>

            <div class="tarjeta-premium overflow-hidden" th:if="${resultados != null and !resultados.isEmpty()}">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="py-3 px-4">ID</th>
                                <th class="py-3">Nombre del Evento</th>
                                <th class="py-3">Fecha Programada</th>
                                <th class="py-3 text-center">Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${resultados}">
                                <td class="px-4 text-muted fw-bold" th:text="${r.id}"></td>
                                <td class="fw-medium" th:text="${r.nombre}"></td>
                                <td th:text="${r.fecha}"></td>
                                <td class="text-center">
                                    <span th:class="${r.activo ? 'badge bg-success bg-opacity-10 text-success border border-success rounded-pill px-3' : 'badge bg-secondary bg-opacity-10 text-secondary border border-secondary rounded-pill px-3'}" 
                                          th:text="${r.activo ? 'Activo' : 'Inactivo'}"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div th:if="${resultados != null and resultados.isEmpty()}" class="text-center py-5">
                <i class="bi bi-clipboard-x text-muted" style="font-size: 3rem;"></i>
                <p class="mt-3 text-muted">No se encontraron registros que coincidan con su búsqueda.</p>
            </div>

        </div>
    </main>

    <footer th:replace="~{plantilla :: footer}"></footer>

    <script>
        function actualizarInterfaz() {
            const selector = document.getElementById('tipoConsulta');
            const valorSeleccionado = selector.value;
            
            const contNombre = document.getElementById('contenedorNombre');
            const contFechas = document.getElementById('contenedorFechas');
            const btn = document.getElementById('contenedorBoton');

            // Resetear visibilidad
            contNombre.style.display = 'none';
            contFechas.style.display = 'none';

            if (valorSeleccionado === 'nombre') {
                contNombre.style.display = 'block';
            } else if (valorSeleccionado === 'fechas') {
                contFechas.style.display = 'block';
            }
        }

        // Ejecutar al cargar para mantener el estado si hubo una búsqueda previa
        window.onload = actualizarInterfaz;
    </script>
</body>
</html>
